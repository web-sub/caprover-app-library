name: Publish One Click Apps

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci && npm run publish
        env:
          GH_PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
