captainVersion: 4
services:
    $$cap_appname:
        image: flipt/flipt:$$cap_flipt_version
        ports:
            - "8080:8080"
        depends_on:
            $$cap_appname-postgres:
                condition: service_healthy
        volumes:
            - $$cap_appname-data:/flipt/data
        restart: unless-stopped
        environment:
            FLIPT_LOG_LEVEL: info
            FLIPT_DATABASE_DRIVER: postgres
            FLIPT_DATABASE_URL: postgres://flipt:$$cap_db_flipt_password@srv-captain--$$cap_appname-postgres:5432/flipt
            FLIPT_SERVER_PORT: 8080
            FLIPT_SERVER_HTTPHOST: 0.0.0.0
            FLIPT_SERVER_HTTPCORSORIGINS: "*"
        caproverExtra:
            containerHttpPort: '8080'
            notExposeAsWebApp: false

    $$cap_appname-postgres:
        image: postgres:15-alpine
        restart: unless-stopped
        volumes:
            - $$cap_appname-postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U flipt"]
            interval: 10s
            timeout: 5s
            retries: 5
        environment:
            POSTGRES_DB: flipt
            POSTGRES_USER: flipt
            POSTGRES_PASSWORD: $$cap_db_flipt_password
            PGDATA: /var/lib/postgresql/data/pgdata
        caproverExtra:
            notExposeAsWebApp: 'true'

caproverOneClickApp:
    variables:
        - defaultValue: latest
          description: Flipt Docker image version. Check https://hub.docker.com/r/flipt/flipt/tags for valid tags.
          id: $$cap_flipt_version
          label: Flipt version
          validRegex: /^([^\s^\/])+$/ 

        - defaultValue: $$cap_gen_random_hex(32)
          description: Database password for the Flipt database user.
          id: $$cap_db_flipt_password
          label: 'Database password'
          validRegex: /^(?=.*\d).{10,}$/ 

    instructions:
        start: >-
            Flipt is an open-source, self-hosted feature flagging and A/B testing service. You can use it to enable or disable features in your app dynamically and run experiments.

        end: >-
            🎉 Flipt has been successfully deployed as $$cap_appname! 🎉

            1. Go to your CapRover app settings page and enable HTTPS.

            2. Enable "Force HTTPS by redirecting all HTTP traffic to HTTPS".

            3. Your service is available at http://$$cap_appname.$$cap_root_domain.

            Visit the Flipt dashboard to configure your feature flags and experiments.

            Note: It may take a minute or two for Flipt to become fully ready.

    displayName: "Flipt Feature Flags"
    isOfficial: false
    description: "Flipt is an open-source, self-hosted feature flagging and A/B testing service."
    documentation: "https://www.flipt.io/docs"
